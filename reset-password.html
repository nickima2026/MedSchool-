<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — MSIB.io</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.1);
          padding:2.5rem 2rem;width:100%;max-width:420px;margin:1rem}
    h1{font-size:1.5rem;font-weight:700;color:#1a2744;margin-bottom:.4rem}
    .sub{color:#666;font-size:.9rem;margin-bottom:1.75rem}
    label{display:block;font-size:.85rem;font-weight:600;color:#444;margin-bottom:.35rem}
    input[type=password]{width:100%;padding:.75rem 1rem;border:1.5px solid #ddd;border-radius:8px;
      font-size:1rem;outline:none;transition:border .2s;margin-bottom:1rem}
    input[type=password]:focus{border-color:#8C1515}
    .strength{height:4px;border-radius:2px;margin-top:-0.75rem;margin-bottom:1rem;
              background:#eee;overflow:hidden}
    .strength-bar{height:100%;width:0;border-radius:2px;transition:width .3s,background .3s}
    .strength-label{font-size:.75rem;color:#888;margin-top:-.5rem;margin-bottom:1rem}
    button{width:100%;padding:.85rem;background:#8C1515;color:#fff;border:none;
           border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s}
    button:hover{background:#6B0F0F}
    button:disabled{background:#ccc;cursor:not-allowed}
    .msg{margin-top:1rem;padding:.75rem 1rem;border-radius:8px;font-size:.875rem;display:none}
    .msg.error{background:#fff0f0;color:#c0392b;border:1px solid #f5c6c6;display:block}
    .msg.success{background:#f0fff4;color:#1a7f4b;border:1px solid #b2dfcc;display:block}
    .invalid-view{text-align:center;padding:1rem 0}
    .invalid-view p{color:#666;margin-bottom:1.5rem}
    a.back{color:#8C1515;text-decoration:none;font-size:.875rem}
  </style>
</head>
<body>
<div class="card" id="card-reset">
  <h1>Set new password</h1>
  <p class="sub">Choose a strong password for your MSIB.io account.</p>
  <label for="pw">New password</label>
  <input type="password" id="pw" placeholder="At least 8 characters" oninput="checkStrength()">
  <div class="strength"><div class="strength-bar" id="sbar"></div></div>
  <div class="strength-label" id="slabel"></div>
  <label for="pw2">Confirm password</label>
  <input type="password" id="pw2" placeholder="Repeat password">
  <button id="btn" onclick="doReset()">Update password</button>
  <div class="msg" id="msg"></div>
</div>
<div class="card" id="card-invalid" style="display:none">
  <div class="invalid-view">
    <h1>Link expired</h1>
    <p>This password reset link is invalid or has already been used.<br>Request a new one from the login page.</p>
    <a class="back" href="/login.html">&#8592; Back to sign in</a>
  </div>
</div>
<script>
  var SUPA_URL = '';
  var accessToken = '';

  (function init() {
    var hash = {};
    window.location.hash.replace(/^#/,'').split('&').forEach(function(p){
      var kv = p.split('='); hash[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]||'');
    });
    if (hash.type !== 'recovery' || !hash.access_token) {
      document.getElementById('card-reset').style.display='none';
      document.getElementById('card-invalid').style.display='block';
      return;
    }
    accessToken = hash.access_token;
    fetch('/api/config').then(function(r){return r.json();}).then(function(cfg){
      SUPA_URL = cfg.supabaseUrl;
    });
  })();

  function checkStrength() {
    var pw = document.getElementById('pw').value;
    var bar = document.getElementById('sbar');
    var lbl = document.getElementById('slabel');
    var levels = [
      {min:0,  w:'0%',   bg:'#eee',    t:''},
      {min:1,  w:'20%',  bg:'#e74c3c', t:'Too short'},
      {min:6,  w:'45%',  bg:'#e67e22', t:'Weak'},
      {min:8,  w:'65%',  bg:'#f1c40f', t:'Fair'},
      {min:10, w:'85%',  bg:'#2ecc71', t:'Good'},
      {min:14, w:'100%', bg:'#27ae60', t:'Strong'}
    ];
    var lvl = levels[0];
    levels.forEach(function(l){ if(pw.length >= l.min) lvl = l; });
    bar.style.width = lvl.w; bar.style.background = lvl.bg; lbl.textContent = lvl.t;
  }

  function doReset() {
    var pw  = document.getElementById('pw').value;
    var pw2 = document.getElementById('pw2').value;
    var msg = document.getElementById('msg');
    var btn = document.getElementById('btn');
    msg.className = 'msg'; msg.textContent = '';
    if (pw.length < 8) { showErr('Password must be at least 8 characters.'); return; }
    if (pw !== pw2)    { showErr('Passwords do not match.'); return; }
    if (!SUPA_URL)     { showErr('Configuration error. Please try again.'); return; }
    btn.disabled = true; btn.textContent = 'Updating…';
    fetch(SUPA_URL + '/auth/v1/user', {
      method: 'PUT',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+accessToken},
      body: JSON.stringify({password: pw})
    }).then(function(r){ return r.json(); }).then(function(data){
      if (data.error) { showErr(data.error_description || data.error); btn.disabled=false; btn.textContent='Update password'; return; }
      msg.className='msg success'; msg.textContent='Password updated! Redirecting to sign in…';
      setTimeout(function(){ window.location.replace('/login.html?reset=1'); }, 2000);
    }).catch(function(){ showErr('Network error. Please try again.'); btn.disabled=false; btn.textContent='Update password'; });
  }

  function showErr(t){ var m=document.getElementById('msg'); m.className='msg error'; m.textContent=t; }
</script>
</body>
</html>
